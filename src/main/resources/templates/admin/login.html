<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Jairo & Jennifer</title>
    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <main class="login-container">
        <section class="login-card">
            <div class="login-avatar">
                    <img th:src="@{/images/icons/user.svg}" alt="Icono de administrador">
                </div>
            <div class="login-header">
                <p class="login-kicker">Administración</p>
                <h1>Panel Administrador</h1>
                <p>Jairo & Jennifer</p>
            </div>
            <form class="login-form" method="post" action="/admin/login">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"

                <div class="form-group">
                    <label for="username">Usuario</label>
                    <div class="input-wrapper">
                        <img th:src="@{/images/icons/log-in.svg}" alt="" class="input-icon">
                        <input type="text" id="username" name="username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <img th:src="@{/images/icons/password.svg}" alt="" class="input-icon">
                        <input type="password" id="password" name="password" required>
                    </div>
                </div>

                <!-- Precaución, error de Login -->
                <div class="login-error" th:if="${param.error}">
                    <p>Usuario o contraseña incorrectos</p>
                </div>

                <!-- Mensaje de Logout-->
                <div class="login-success" th:if="${param.logout}">
                    <p>Sesión cerrada correctamente</p>
                </div>
                <div class="form-submit">
                    <button type="submit">Iniciar sesión</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
